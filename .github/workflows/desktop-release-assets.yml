name: Desktop Release Assets

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to download and verify
        required: true
        default: ffmpeg-8.1.2-pilot.2

permissions:
  contents: read

env:
  FFMPEG_PACKAGING_TEST_ROOT: ${{ github.workspace }}-test

jobs:
  linux-x64:
    name: Linux x64 release asset
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install host tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            binutils curl python3 ripgrep unzip

      - name: Download release asset
        run: scripts/download-release-desktop-assets.sh "${{ github.event.inputs.tag }}" linux-x64

      - name: Verify release asset
        run: scripts/verify-desktop-cli.sh "$FFMPEG_PACKAGING_TEST_ROOT/release-assets/${{ github.event.inputs.tag }}/linux-x64"

  macos-universal-arm64:
    name: macOS universal release asset on arm64
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install host tools
        run: brew install ripgrep

      - name: Download release asset
        run: scripts/download-release-desktop-assets.sh "${{ github.event.inputs.tag }}" darwin-universal

      - name: Verify release asset
        run: scripts/verify-desktop-cli.sh "$FFMPEG_PACKAGING_TEST_ROOT/release-assets/${{ github.event.inputs.tag }}/darwin-universal"

  macos-universal-x64:
    name: macOS universal release asset on x64
    runs-on: macos-15-intel
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install host tools
        run: brew install ripgrep

      - name: Download release asset
        run: scripts/download-release-desktop-assets.sh "${{ github.event.inputs.tag }}" darwin-universal

      - name: Verify release asset
        run: scripts/verify-desktop-cli.sh "$FFMPEG_PACKAGING_TEST_ROOT/release-assets/${{ github.event.inputs.tag }}/darwin-universal"

  windows-x64:
    name: Windows x64 release asset
    runs-on: windows-2022
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download release asset
        shell: bash
        run: scripts/download-release-desktop-assets.sh "${{ github.event.inputs.tag }}" windows-x64

      - name: Verify release asset
        shell: pwsh
        run: |
          python tests/desktop_cli/verify_media.py `
            --ffmpeg "$env:FFMPEG_PACKAGING_TEST_ROOT/release-assets/${{ github.event.inputs.tag }}/windows-x64/ffmpeg.exe" `
            --ffprobe "$env:FFMPEG_PACKAGING_TEST_ROOT/release-assets/${{ github.event.inputs.tag }}/windows-x64/ffprobe.exe" `
            --work-dir "$env:FFMPEG_PACKAGING_TEST_ROOT/work" `
            --target windows-x64
