name: Android AAR

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  FFMPEG_PACKAGING_TEST_ROOT: ${{ github.workspace }}-test

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install host tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            autoconf \
            automake \
            curl \
            git \
            libtool \
            make \
            pkg-config \
            ripgrep \
            xz-utils \
            zip

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install pinned Android NDK
        shell: bash
        run: |
          set -euo pipefail
          source versions.env
          set +o pipefail
          yes | sdkmanager --licenses >/dev/null
          set -o pipefail
          sdkmanager "ndk;$ANDROID_NDK_VERSION"
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/$ANDROID_NDK_VERSION" >> "$GITHUB_ENV"

      - name: Build Android targets
        run: |
          scripts/build-mobile.sh android-arm64
          scripts/build-mobile.sh android-armv7

      - name: Package and verify AAR
        run: scripts/verify-mobile.sh --target android-arm64 --target android-armv7

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-android-aar
          path: |
            ${{ env.FFMPEG_PACKAGING_TEST_ROOT }}/dist/mobile/android/ffmpeg.aar
            ${{ env.FFMPEG_PACKAGING_TEST_ROOT }}/dist/mobile/android/ffmpeg.aar.sha256
            ${{ env.FFMPEG_PACKAGING_TEST_ROOT }}/dist/mobile/android/ffmpeg.aar.manifest.env
          if-no-files-found: error
